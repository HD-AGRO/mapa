<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background: ForSeed dark teal -->
  <rect width="512" height="512" rx="90" fill="#0f2830"/>
  <!-- Outer border ring: ForSeed green -->
  <rect x="16" y="16" width="480" height="480" rx="76" fill="none" stroke="#6abf8a" stroke-width="6" opacity="0.5"/>
  <!-- Corn icon top center -->
  <text x="256" y="130" font-family="system-ui" font-size="120" text-anchor="middle">🌽</text>
  <!-- HD AGRO text -->
  <text x="256" y="230" font-family="system-ui,sans-serif" font-size="88" font-weight="900" fill="#f5c020" text-anchor="middle" letter-spacing="1">HD</text>
  <text x="256" y="318" font-family="system-ui,sans-serif" font-size="60" font-weight="700" fill="#6abf8a" text-anchor="middle" letter-spacing="5">AGRO</text>
  <!-- ForSeed tagline -->
  <text x="256" y="370" font-family="system-ui,sans-serif" font-size="28" font-weight="400" fill="#f5c020" text-anchor="middle" letter-spacing="2" opacity="0.8">ForSeed</text>
  <!-- Bottom dots: state colors -->
  <circle cx="206" cy="420" r="14" fill="#38bdf8"/>
  <circle cx="256" cy="420" r="14" fill="#6abf8a"/>
  <circle cx="306" cy="420" r="14" fill="#f5c020"/>
  <text x="206" y="455" font-family="system-ui" font-size="16" fill="#38bdf8" text-anchor="middle">AL</text>
  <text x="256" y="455" font-family="system-ui" font-size="16" fill="#6abf8a" text-anchor="middle">BA</text>
  <text x="306" y="455" font-family="system-ui" font-size="16" fill="#f5c020" text-anchor="middle">PE</text>
</svg>