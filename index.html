<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>HD AGRO — Território</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<style>
:root{--bg:#0b1512;--sf:#111f19;--sf2:#172b22;--b:rgba(255,255,255,0.07);--b2:rgba(255,255,255,0.13);--gold:#e8c96a;--al:#38bdf8;--ba:#4ade80;--pe:#fbbf24;--ts:#22d3ee;--tx:#e2ede8;--dm:#6b8c7a;--ok:#22c55e;--warn:#f59e0b;--danger:#ef4444;--gray:#6b7280;}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{width:100%;height:100%;overflow:hidden;font-family:system-ui,sans-serif;background:var(--bg);color:var(--tx);display:flex;flex-direction:column;}

/* ── HEADER: 2 compact rows ── */
#hdr{flex-shrink:0;background:linear-gradient(90deg,#0d1f17,#0b1512);border-bottom:1px solid var(--b2);display:flex;flex-direction:column;}

/* Row 1: brand + stats */
.hrow1{display:flex;align-items:center;gap:8px;padding:5px 12px;flex-wrap:wrap;}
.brand{display:flex;align-items:center;gap:8px;flex-shrink:0;}
.bdg{font-size:14px;font-weight:800;letter-spacing:2px;color:var(--gold);background:rgba(232,201,106,0.1);border:1px solid rgba(232,201,106,0.3);padding:3px 8px;border-radius:5px;}
.brt{font-size:11px;font-weight:600;color:var(--dm);}
.hstats{display:flex;gap:5px;align-items:center;flex-wrap:wrap;margin-left:auto;}
.hcard{background:var(--sf2);border:1px solid var(--b);border-radius:6px;padding:3px 9px;display:flex;align-items:center;gap:5px;}
.hcard-t{font-size:8px;color:var(--dm);text-transform:uppercase;letter-spacing:0.6px;font-weight:600;}
.hcn{font-size:15px;font-weight:800;line-height:1;}
.hcl{font-size:8px;color:var(--dm);text-transform:uppercase;}
.hsep{width:1px;height:24px;background:var(--b2);}

/* Row 2: filter bar */
.hrow2{display:flex;align-items:center;gap:4px;padding:4px 10px;border-top:1px solid var(--b);overflow-x:auto;background:var(--sf);flex-shrink:0;}
.hrow2::-webkit-scrollbar{height:2px;}
.hrow2::-webkit-scrollbar-track{background:var(--sf);}
.hrow2::-webkit-scrollbar-thumb{background:var(--b2);}

/* Chips */
.fchip{padding:2px 8px;border-radius:20px;border:1.5px solid;font-size:10px;font-weight:600;cursor:pointer;background:transparent;white-space:nowrap;transition:all 0.15s;flex-shrink:0;}
.fchip.st-al{border-color:var(--al);color:var(--al);}.fchip.st-al.on{background:var(--al);color:#000;}
.fchip.st-ba{border-color:var(--ba);color:var(--ba);}.fchip.st-ba.on{background:var(--ba);color:#000;}
.fchip.st-pe{border-color:var(--pe);color:var(--pe);}.fchip.st-pe.on{background:var(--pe);color:#000;}
.fchip.av-ok{border-color:var(--ok);color:var(--ok);}.fchip.av-ok.on{background:rgba(34,197,94,0.2);}
.fchip.av-warn{border-color:var(--warn);color:var(--warn);}.fchip.av-warn.on{background:rgba(245,158,11,0.2);}
.fchip.av-danger{border-color:var(--danger);color:var(--danger);}.fchip.av-danger.on{background:rgba(239,68,68,0.2);}
.fchip.av-gray{border-color:var(--gray);color:var(--gray);}.fchip.av-gray.on{background:rgba(107,114,128,0.2);}

/* Selects */
.fsel{background:var(--sf2);border:1px solid var(--b2);border-radius:5px;color:var(--tx);font-size:9px;padding:3px 5px;cursor:pointer;outline:none;flex-shrink:0;max-width:120px;}
.fsel:focus{border-color:var(--gold);}
.fsel option{background:var(--sf2);}

/* Layer buttons */
.lbtn{padding:2px 7px;border-radius:5px;border:1px solid var(--b);color:var(--dm);font-size:9px;cursor:pointer;background:transparent;white-space:nowrap;transition:all 0.15s;flex-shrink:0;}
.lbtn::before{content:'';display:inline-block;width:5px;height:5px;border-radius:50%;background:var(--b2);margin-right:3px;vertical-align:middle;}
.lbtn.on{color:var(--tx);border-color:var(--b2);}.lbtn.on::before{background:var(--gold);}

/* Separator */
.fsep{width:1px;height:18px;background:var(--b2);flex-shrink:0;}

/* Search */
.srch-w{position:relative;flex-shrink:0;}
.srch-i{background:var(--sf2);border:1px solid var(--b2);border-radius:5px;color:var(--tx);padding:3px 22px 3px 20px;font-size:10px;width:160px;outline:none;}
.srch-i:focus{border-color:var(--gold);}
.srch-i::placeholder{color:var(--dm);}
.srch-icon{position:absolute;left:6px;top:50%;transform:translateY(-50%);color:var(--dm);font-size:9px;pointer-events:none;}
.srch-c{position:absolute;right:5px;top:50%;transform:translateY(-50%);font-size:9px;color:var(--ts);pointer-events:none;}

/* Reset + result */
.f-reset{padding:2px 8px;border-radius:4px;border:1px solid var(--b2);color:var(--dm);font-size:9px;cursor:pointer;background:transparent;flex-shrink:0;}
.f-reset:hover{border-color:var(--danger);color:var(--danger);}
.f-result{font-size:9px;color:var(--dm);white-space:nowrap;flex-shrink:0;}
.f-result b{color:var(--ts);}

/* ── MAP ── */
#mwrap{flex:1;position:relative;min-height:0;}
#map{position:absolute;inset:0;}

/* Status bar */
#sbar{position:absolute;top:8px;left:50%;transform:translateX(-50%);z-index:800;display:flex;gap:4px;pointer-events:none;}
.sb{display:flex;align-items:center;gap:3px;background:rgba(11,21,18,0.92);border:1px solid var(--b2);border-radius:20px;padding:3px 8px;font-size:10px;font-weight:600;white-space:nowrap;}
.sb-d{width:7px;height:7px;border-radius:50%;flex-shrink:0;}

/* ── SIDE PANEL ── */
#pnl{position:absolute;right:0;top:0;bottom:0;width:290px;background:var(--sf);border-left:1px solid var(--b2);z-index:900;display:flex;flex-direction:column;transform:translateX(100%);transition:transform 0.25s;pointer-events:none;}
#pnl.open{transform:translateX(0);pointer-events:all;}
.ph{padding:10px 10px 7px;border-bottom:1px solid var(--b);display:flex;align-items:flex-start;justify-content:space-between;gap:5px;}
.pn{font-size:17px;font-weight:700;color:var(--gold);line-height:1.1;}
.pbg{font-size:10px;font-weight:600;padding:2px 6px;border-radius:3px;border:1px solid;margin-top:3px;display:inline-block;}
.pc{background:none;border:none;color:var(--dm);font-size:15px;cursor:pointer;padding:1px;}
.pb{flex:1;overflow-y:auto;padding:10px;}
.ps{margin-bottom:10px;}
.pst{font-size:8px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--dm);margin-bottom:5px;padding-bottom:3px;border-bottom:1px solid var(--b);}
.pr{display:flex;justify-content:space-between;padding:3px 0;font-size:11px;border-bottom:1px solid var(--b);}
.pr:last-child{border:none;}.prl{color:var(--dm);}.prv{font-weight:600;}
.ptg{display:inline-flex;align-items:center;gap:3px;padding:3px 7px;border-radius:4px;font-size:10px;font-weight:600;margin-top:6px;}
.tc{background:rgba(34,211,238,0.06);border:1px solid rgba(34,211,238,0.2);border-radius:7px;padding:9px;margin-top:5px;}
.tct{font-size:11px;font-weight:700;color:var(--ts);margin-bottom:7px;}
.tr{display:flex;justify-content:space-between;padding:3px 0;font-size:10px;border-bottom:1px solid rgba(34,211,238,0.1);}
.tr:last-of-type{border:none;}.trl{color:rgba(34,211,238,0.6);}.trv{font-weight:600;}.trh{color:var(--ts);font-size:12px;font-weight:700;}
.rb{display:flex;align-items:center;justify-content:center;gap:4px;width:100%;margin-top:4px;padding:6px;background:rgba(34,211,238,0.1);border:1px solid rgba(34,211,238,0.28);border-radius:5px;color:var(--ts);font-size:10px;font-weight:600;text-decoration:none;transition:background 0.15s;}
.rb:hover{background:rgba(34,211,238,0.2);}
.rb.gold{background:rgba(232,201,106,0.1);border-color:rgba(232,201,106,0.28);color:var(--gold);}
.rb.gold:hover{background:rgba(232,201,106,0.2);}
.notest{text-align:center;color:var(--dm);font-size:11px;padding:10px 0;}
.av-badge{display:inline-flex;align-items:center;gap:3px;padding:2px 7px;border-radius:3px;font-size:10px;font-weight:700;}

/* Legend */
#leg{position:absolute;bottom:18px;left:9px;z-index:800;background:rgba(11,21,18,0.94);border:1px solid var(--b2);border-radius:8px;padding:10px 12px;min-width:172px;}
.lt{font-size:10px;font-weight:700;letter-spacing:1px;color:var(--gold);margin-bottom:8px;text-transform:uppercase;}
.lr{display:flex;align-items:center;gap:6px;margin-bottom:4px;font-size:9px;color:var(--dm);}
.ls{width:16px;height:6px;border-radius:2px;flex-shrink:0;}
.lsep{height:1px;background:var(--b);margin:5px 0;}
.leaflet-control-zoom{border:1px solid var(--b2)!important;border-radius:7px!important;overflow:hidden;}
.leaflet-control-zoom a{background:var(--sf)!important;color:var(--tx)!important;border-color:var(--b)!important;}
.leaflet-control-zoom a:hover{background:var(--sf2)!important;color:var(--gold)!important;}
.leaflet-control-scale-line{background:rgba(11,21,18,0.85)!important;border-color:var(--b2)!important;color:var(--dm)!important;font-size:9px!important;border-radius:3px;padding:1px 5px;}
.leaflet-tooltip{background:var(--sf2)!important;border:1px solid var(--b2)!important;color:var(--tx)!important;font-size:10px!important;border-radius:4px!important;padding:3px 7px!important;box-shadow:0 2px 6px rgba(0,0,0,0.4)!important;}
.leaflet-control-attribution{background:rgba(11,21,18,0.7)!important;color:var(--dm)!important;font-size:8px!important;}
.ll-at{background:transparent!important;border:none!important;box-shadow:none!important;font-size:11px;font-weight:800;white-space:nowrap;pointer-events:none;line-height:1;}
.ll-tr{background:transparent!important;border:none!important;box-shadow:none!important;font-size:8px;font-weight:400;white-space:nowrap;pointer-events:none;line-height:1;}
#toast-el{position:absolute;bottom:60px;left:50%;transform:translateX(-50%) translateY(10px);background:var(--sf2);border:1px solid var(--b2);border-radius:7px;padding:5px 13px;font-size:10px;z-index:2000;opacity:0;transition:all 0.2s;pointer-events:none;white-space:nowrap;}
#toast-el.show{opacity:1;transform:translateX(-50%) translateY(0);}
@keyframes pulse{0%{box-shadow:0 0 0 0 rgba(34,211,238,0.7);}70%{box-shadow:0 0 0 7px rgba(34,211,238,0);}100%{box-shadow:0 0 0 0 rgba(34,211,238,0);}}
.tmi{animation:pulse 2s infinite;}
::-webkit-scrollbar{width:3px;}::-webkit-scrollbar-track{background:var(--sf);}::-webkit-scrollbar-thumb{background:var(--b2);border-radius:2px;}
</style>
</head>
<body>

<div id="hdr">
  <!-- ROW 1: brand + stats -->
  <div class="hrow1">
    <div class="brand">
      <div class="bdg">HD AGRO</div>
      <div class="brt">Território · Nordeste</div>
    </div>
    <div class="hstats">
      <div class="hcard">
        <span class="hcard-t">📋</span>
        <span class="hcn" style="color:var(--al)">102</span><span class="hcl">AL</span>
        <span class="hcn" style="color:var(--ba)">58</span><span class="hcl">BA</span>
        <span class="hcn" style="color:var(--pe)">120</span><span class="hcl">PE</span>
      </div>
      <div class="hcard">
        <span class="hcard-t">🔥</span>
        <span class="hcn" style="color:var(--al)">15</span><span class="hcl">AL</span>
        <span class="hcn" style="color:var(--ba)">24</span><span class="hcl">BA</span>
        <span class="hcn" style="color:var(--pe)">3</span><span class="hcl">PE</span>
      </div>
      <div class="hsep"></div>
      <div class="hcard">
        <span class="hcard-t">🌱</span>
        <span class="hcn" style="color:var(--ok)"   id="hc-ok">13</span><span class="hcl">✅</span>
        <span class="hcn" style="color:var(--warn)"  id="hc-pend">17</span><span class="hcl">⏳</span>
        <span class="hcn" style="color:var(--danger)"id="hc-atrs">11</span><span class="hcl">🔴</span>
        <span class="hcn" style="color:var(--gray)"  id="hc-sem">9</span><span class="hcl">—</span>
      </div>
      <div class="hcard">
        <span class="hcard-t">🌽</span>
        <span class="hcn" style="color:var(--ba)">100k</span><span class="hcl">BA</span>
        <span class="hcn" style="color:var(--al)">25k</span><span class="hcl">AL</span>
        <span class="hcn" style="color:var(--pe)">3k</span><span class="hcl">PE</span>
        <span class="hcn" style="color:var(--tx)">128k</span><span class="hcl">ha</span>
      </div>
    </div>
  </div>
  <!-- ROW 2: filters -->
  <div class="hrow2">
    <button class="fchip st-al" id="chip-al" onclick="toggleChip('estado','AL',this)">AL</button>
    <button class="fchip st-ba" id="chip-ba" onclick="toggleChip('estado','BA',this)">BA</button>
    <button class="fchip st-pe" id="chip-pe" onclick="toggleChip('estado','PE',this)">PE</button>
    <div class="fsep"></div>
    <button class="fchip av-ok"     id="chip-ok"   onclick="toggleChip('av_group','OK',this)">✅ Em dia</button>
    <button class="fchip av-warn"   id="chip-pend" onclick="toggleChip('av_group','PEND',this)">⏳ Pend.</button>
    <button class="fchip av-danger" id="chip-atrs" onclick="toggleChip('av_group','ATRS',this)">🔴 Atras.</button>
    <button class="fchip av-gray"   id="chip-sem"  onclick="toggleChip('av_group','SEM',this)">— S/data</button>
    <div class="fsep"></div>
    <select class="fsel" id="sel-cli"    onchange="setFilter('cliente',this.value)"      title="Cliente"><option value="">👤 Cliente</option><option value="ALFREDO GÓIS">Alfredo Góis</option><option value="ANTONIO OLAVO FRAGA CARVALHO">Antonio Olavo Fraga Carvalho</option><option value="ANTONIO RIVANILDO GAMA SILVA">Antonio Rivanildo Gama Silva</option><option value="CARMELITA VIRGENS">Carmelita Virgens</option><option value="CHARLES DE JESUS ROSÁRIO">Charles De Jesus Rosário</option><option value="CLAUDIANO MENEZES DOS SANTOS">Claudiano Menezes Dos Santos</option><option value="CRIZANTO ROBERTO ROCHA">Crizanto Roberto Rocha</option><option value="DOUGLAS CARDOSO">Douglas Cardoso</option><option value="DOUGLAS LOCK">Douglas Lock</option><option value="EDINEI SANTANA">Edinei Santana</option><option value="EDIVALDO ALVES DA SILVA">Edivaldo Alves Da Silva</option><option value="EDNALDO MOREIRA DA SILVA">Ednaldo Moreira Da Silva</option><option value="ELIZEU SANTOS">Elizeu Santos</option><option value="FLÁVIO GÓIS">Flávio Góis</option><option value="IDINEI SANTOS NASCIMENTO">Idinei Santos Nascimento</option><option value="JANDIR SILVA DO NASCIMENTO">Jandir Silva Do Nascimento</option><option value="JORGE OLIVEIRA">Jorge Oliveira</option><option value="JOSÉ DE ANA">José De Ana</option><option value="JOSÉ FRAGA">José Fraga</option><option value="JOSÉ HAMILTON FRAGA">José Hamilton Fraga</option><option value="JOSÉ HELIO NASCIMENTO SANTOS">José Helio Nascimento Santos</option><option value="JOSÉ LOURENÇO DOS SANTOS">José Lourenço Dos Santos</option><option value="JOSÉ LOURENÇO DOS SANTOS (OUTRO) 111">José Lourenço Dos Santos (Outro) 111</option><option value="JOÃO ANTENOR CAVALCANTE">João Antenor Cavalcante</option><option value="JOÃO PINHEIRO JUNIOR">João Pinheiro Junior</option><option value="JOÃO TUCANO FILHO">João Tucano Filho</option><option value="LUAN FONTES">Luan Fontes</option><option value="MANOEL MESSIAS">Manoel Messias</option><option value="NETO">Neto</option><option value="RANIERE PIMENTEL DE SANTANA">Raniere Pimentel De Santana</option><option value="RIKSON DOS SANTOS SILVA">Rikson Dos Santos Silva</option><option value="ROBERTO CHIBATTA">Roberto Chibatta</option><option value="SALUSTIANO">Salustiano</option><option value="SILVA E DUARTE LTDA (TUTA e LAERCIO)">Silva E Duarte Ltda (Tuta E Laercio)</option><option value="SÉRGIO GÓIS">Sérgio Góis</option><option value="SÍLVIO MENEZES TAVARES">Sílvio Menezes Tavares</option><option value="WILLIAN FRAGA">Willian Fraga</option></select>
    <select class="fsel" id="sel-hib"    onchange="setFilter('hibrido',this.value)"      title="Híbrido"><option value="">🌽 Híbrido</option><option value="FS1503PWU">FS1503PWU</option><option value="FS1680PWU">FS1680PWU</option><option value="FS560PWU">FS560PWU</option><option value="FS566PWU">FS566PWU</option><option value="FS650PWU">FS650PWU</option><option value="FS656PWU">FS656PWU</option><option value="FS670PWU">FS670PWU</option><option value="FS695PWU">FS695PWU</option><option value="FSCOD1918PWU">FSCOD1918PWU</option></select>
    <select class="fsel" id="sel-dist"   onchange="setFilter('distribuidor',this.value)" title="Distribuidor"><option value="">🚚 Dist.</option><option value="CAMPO REAL">CAMPO REAL</option><option value="CULTIVA">CULTIVA</option><option value="OMEGA">OMEGA</option><option value="RB DANTAS">RB DANTAS</option></select>
    <select class="fsel" id="sel-lpht"   onchange="setFilter('lpht',this.value)"         title="App LPHT"><option value="">📱 LPHT</option><option value="sim">✅ SIM</option><option value="nao">— NÃO</option></select>
    <select class="fsel" id="sel-ensaio" onchange="setFilter('ensaio',this.value)"       title="Ensaio"><option value="">🔬 Ensaio</option><option value="GDE">GDE</option><option value="SBS">SBS</option><option value="COMERCIAL">Comercial</option></select>
    <div class="fsep"></div>
    <button class="lbtn on" id="b-at"   onclick="tg('at')">🔥 Ativos</button>
    <button class="lbtn on" id="b-terr" onclick="tg('terr')">Território</button>
    <button class="lbtn on" id="b-ts"   onclick="tg('ts')" style="color:var(--ts)">🌱 Testes</button>
    <button class="lbtn on" id="b-bd"   onclick="tg('bd')">Divisas</button>
    <button class="lbtn on" id="ln-at"  onclick="tgN('at')">Nm. Ativos</button>
    <button class="lbtn on" id="ln-tr"  onclick="tgN('tr')">Nm. Territ.</button>
    <button class="lbtn on" id="b-sat"  onclick="tgSat()">Satélite</button>
    <div class="fsep"></div>
    <div class="srch-w">
      <span class="srch-icon">🔍</span>
      <input class="srch-i" type="text" id="srch" placeholder="Buscar..." oninput="doSrch(this.value)">
      <span class="srch-c" id="sc"></span>
    </div>
    <button class="f-reset" onclick="resetAll()">✕ Limpar</button>
    <span class="f-result" id="f-result"></span>
  </div>
</div>

<div id="mwrap">
  <div id="map"></div>
  <div id="sbar">
    <div class="sb"><div class="sb-d" style="background:var(--ok)"></div><span id="sb-ok">13 em dia</span></div>
    <div class="sb"><div class="sb-d" style="background:var(--warn)"></div><span id="sb-pend">17 pendente</span></div>
    <div class="sb"><div class="sb-d" style="background:var(--danger)"></div><span id="sb-atrs">11 atrasada</span></div>
    <div class="sb"><div class="sb-d" style="background:var(--gray)"></div><span id="sb-sem">9 sem data</span></div>
  </div>
  <div id="leg">
    <div class="lt">HD AGRO</div>
    <div class="lr"><div style="width:16px;height:7px;border-radius:2px;background:rgba(56,189,248,0.7);border:1.5px solid #fff;flex-shrink:0;"></div><span style="color:var(--al)">🔥 Ativo AL (15)</span></div>
    <div class="lr"><div style="width:16px;height:7px;border-radius:2px;background:rgba(74,222,128,0.7);border:1.5px solid #fff;flex-shrink:0;"></div><span style="color:var(--ba)">🔥 Ativo BA (24)</span></div>
    <div class="lr"><div style="width:16px;height:7px;border-radius:2px;background:rgba(251,191,36,0.7);border:1.5px solid #fff;flex-shrink:0;"></div><span style="color:var(--pe)">🔥 Ativo PE (3)</span></div>
    <div class="lsep"></div>
    <div class="lr"><div style="width:13px;height:13px;border-radius:50%;background:var(--ok);border:2px solid #fff;flex-shrink:0;"></div><span style="color:var(--ok)">✅ Avaliação em dia</span></div>
    <div class="lr"><div style="width:13px;height:13px;border-radius:50%;background:var(--warn);border:2px solid #fff;flex-shrink:0;"></div><span style="color:var(--warn)">⏳ AV pendente</span></div>
    <div class="lr"><div style="width:13px;height:13px;border-radius:50%;background:var(--danger);border:2px solid #fff;flex-shrink:0;"></div><span style="color:var(--danger)">🔴 AV atrasada</span></div>
    <div class="lr"><div style="width:11px;height:11px;border-radius:50%;background:var(--ts);border:1.5px dashed rgba(255,255,255,0.6);opacity:0.75;flex-shrink:0;"></div><span style="color:var(--ts);opacity:0.8">📍 Centro município</span></div>
  </div>
  <div id="pnl">
    <div class="ph"><div><div class="pn" id="p-n">—</div><div id="p-b" class="pbg">—</div></div><button class="pc" onclick="clsP()">✕</button></div>
    <div class="pb" id="p-body"></div>
  </div>
  <div id="toast-el"></div>

  var sem_n=matched.filter(function(t){return SEM_S.indexOf(t.status)>=0;}).length;
  [['sb-ok',ok_n+' em dia'],['sb-pend',pend_n+' pendente'],['sb-atrs',atrs_n+' atrasada'],['sb-sem',sem_n+' sem data'],
   ['hc-ok',ok_n],['hc-pend',pend_n],['hc-atrs',atrs_n],['hc-sem',sem_n]].forEach(function(p){var el=document.getElementById(p[0]);if(el)el.textContent=p[1];});
  var hasF=F.estados.size>0||F.av_groups.size>0||F.cliente||F.hibrido||F.distribuidor||F.lpht||F.ensaio||F.busca;
  var res=document.getElementById('f-result');if(res)res.innerHTML=hasF?'<b>'+matched.length+'</b> testes':'';
  var sc2=document.getElementById('sc');if(sc2&&F.busca)sc2.textContent=matched.length?'🌱'+matched.length:'';else if(sc2)sc2.textContent='';
  updL();
}

document.addEventListener('DOMContentLoaded',function(){
  map=L.map('map',{center:[-10.5,-38.5],zoom:7,zoomControl:false,preferCanvas:true});
  L.control.zoom({position:'bottomright'}).addTo(map);
  L.control.scale({position:'bottomright',imperial:false,maxWidth:100}).addTo(map);
  var dark=L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',{attribution:'© CARTO',maxZoom:19});
  var osm=L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png',{attribution:'© OSM',maxZoom:19});
  var sat=L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',{attribution:'© Esri',maxZoom:19});
  dark.addTo(map);dark.on('tileerror',function(){map.removeLayer(dark);osm.addTo(map);});
  var satOn=false;
  window.tgSat=function(){satOn=!satOn;var b=document.getElementById('b-sat');if(satOn){map.removeLayer(dark);map.removeLayer(osm);sat.addTo(map);b.textContent='Satélite';}else{map.removeLayer(sat);dark.addTo(map);b.textContent='Satélite';}};

  var bdL=L.geoJSON(STATES,{style:function(f){var c=SC[f.properties.sigla]||'#666';return{color:c,weight:2.5,opacity:0.8,fill:false};},onEachFeature:function(f,l){l.bindTooltip(f.properties.name,{sticky:true});}}).addTo(map);
  function mkTerr(geo,est){var c=SC[est];return L.geoJSON(geo,{style:function(){return{color:c,weight:0.6,opacity:0.45,fillColor:c,fillOpacity:0.09};},onEachFeature:function(f,l){l.on('click',function(){opP(f.properties.name,est,'t');});l.on('mouseover',function(e){e.target.setStyle({fillOpacity:0.22,weight:1.2});toast(f.properties.name);});l.on('mouseout',function(e){e.target.setStyle({fillOpacity:0.09,weight:0.6});});}});}
  var alL=mkTerr(TALGEO,'AL').addTo(map);
  var baL=mkTerr(TBAGEO,'BA').addTo(map);
  var peL=mkTerr(TPEGEO,'PE').addTo(map);
  var atL=L.geoJSON(ATGEO,{style:function(f){var c=SC[f.properties.estado]||'#fff';return{color:'rgba(255,255,255,0.9)',weight:2,opacity:1,fillColor:c,fillOpacity:0.55};},onEachFeature:function(f,l){var e=f.properties.estado,c=SC[e]||'#fff';l.on('click',function(){opP(f.properties.name,e,'at');});l.on('mouseover',function(ev){ev.target.setStyle({fillOpacity:0.8,weight:2.5});toast('🔥 '+f.properties.name);});l.on('mouseout',function(ev){ev.target.setStyle({fillOpacity:0.55,weight:2,color:'rgba(255,255,255,0.9)',fillColor:c});});}}).addTo(map);
  tsG=L.layerGroup().addTo(map);

  function cen(f){var pts=[];function c(x){if(!Array.isArray(x[0])){pts.push(x);return;}x.forEach(c);}c(f.geometry.coordinates);var sLa=0,sLg=0,n=0;pts.forEach(function(p){sLa+=p[1];sLg+=p[0];n++;});return[sLa/n,sLg/n];}
  lG={at:L.layerGroup().addTo(map),al:L.layerGroup().addTo(map),ba:L.layerGroup().addTo(map),pe:L.layerGroup().addTo(map)};
  lV={at:true,al:true,ba:true,pe:true};
  ATGEO.features.forEach(function(f){var name=f.properties.name,e=f.properties.estado,c=SC[e]||'#fff';var lbl=L.marker(cen(f),{icon:L.divIcon({className:'ll-at',html:'<span style="color:'+c+';text-shadow:0 0 4px #000,0 0 6px #000">'+name+'</span>',iconAnchor:[0,0]}),interactive:false,zIndexOffset:1200});lG.at.addLayer(lbl);});
  var terrAll=TALGEO.features.concat(TBAGEO.features).concat(TPEGEO.features);
  terrAll.forEach(function(f){var name=f.properties.name,id=f.properties.id||'',e=f.properties.estado;if(!e){if(id.startsWith('27'))e='AL';else if(id.startsWith('29'))e='BA';else e='PE';}var c=SC[e]||'#fff';var lbl=L.marker(cen(f),{icon:L.divIcon({className:'ll-tr',html:'<span style="color:'+c+';opacity:0.5;text-shadow:0 0 2px #000">'+name+'</span>',iconAnchor:[0,0]}),interactive:false,zIndexOffset:300});lbl._lt=e.toLowerCase();lG[e.toLowerCase()].addLayer(lbl);});

  function updL(){var z=map.getZoom();Object.keys(lG).forEach(function(k){lG[k].eachLayer(function(l){var el=l.getElement?l.getElement():null;if(!el)return;if(k==='at')el.style.display=lNV.at?'':'none';else el.style.display=(lNV.tr&&z>=7)?'':'none';});});}
  window.updL=updL;
  map.on('zoomend',updL);

  window.tgN=function(k){lNV[k]=!lNV[k];document.getElementById('ln-'+k).classList.toggle('on',lNV[k]);updL();};

  function mkI(c,sz,b){var brd=b?'1.5px solid rgba(255,255,255,0.8)':'1px solid rgba(255,255,255,0.2)';var bs=b?'0 0 6px '+c+'bb,0 0 12px '+c+'33':'0 0 2px '+c+'44';return L.divIcon({html:'<div style="width:'+sz+'px;height:'+sz+'px;background:'+c+';border-radius:50%;border:'+brd+';box-shadow:'+bs+'"></div>',className:'',iconSize:[sz,sz],iconAnchor:[sz>>1,sz>>1]});}
  ATIVOS.forEach(function(a){var c=SC[a.estado]||'#fff';var m=L.marker([a.lat,a.lng],{icon:mkI(c,10,true),zIndexOffset:1000});m.on('click',function(){opP(a.name,a.estado,'at');});m.data=a;m._ti='at';m.addTo(map);AM.push(m);});
  TERRITORIO.forEach(function(d){if(AN.has(norm(d.name)))return;var c=SC[d.estado]||'#fff';var m=L.marker([d.lat,d.lng],{icon:mkI(c,3,false),zIndexOffset:0});m.setOpacity(0.3);m.on('click',function(){opP(d.name,d.estado,'t');});m.data=d;m._ti='t';m.addTo(map);AM.push(m);});

  var terrOn=true,atOn=true,tsOn=true,bdOn=true;
  window.tg=function(k){var b=document.getElementById('b-'+k);
    if(k==='terr'){terrOn=!terrOn;[alL,baL,peL].forEach(function(l){terrOn?map.addLayer(l):map.removeLayer(l);});b.classList.toggle('on',terrOn);}
    else if(k==='at'){atOn=!atOn;atOn?map.addLayer(atL):map.removeLayer(atL);b.classList.toggle('on',atOn);}
    else if(k==='ts'){tsOn=!tsOn;tsOn?map.addLayer(tsG):map.removeLayer(tsG);b.classList.toggle('on',tsOn);}
    else if(k==='bd'){bdOn=!bdOn;bdOn?map.addLayer(bdL):map.removeLayer(bdL);b.classList.toggle('on',bdOn);}
  };

  function avProgress(t){function step(done,lbl){return '<div style="flex:1;text-align:center;"><div style="height:6px;border-radius:3px;background:'+(done?'#22c55e':'rgba(255,255,255,0.1)')+';margin-bottom:3px;"></div><div style="font-size:8px;color:'+(done?'#22c55e':'var(--dm)')+'">'+lbl+'</div></div>';}return '<div style="display:flex;gap:4px;margin:8px 0 4px;">'+step(!!t.av1,'AV1')+step(!!t.av2,'AV2')+step(!!(t.av3),'AV3')+step(!!(t.av4),'Colheita')+'</div>';}
  function statusBadge(t){var c2=ST_COLOR[t.status]||'#6b7280';return '<div class="av-badge" style="background:'+c2+'22;border:1px solid '+c2+'55;color:'+c2+';">'+(ST_LABEL[t.status]||t.status)+'</div>';}

  function opP(name,est,tier){
    var isAt=AN.has(norm(name));var c=SC[est]||'#fff';
    document.getElementById('p-n').textContent=name;
    var bg=document.getElementById('p-b');bg.textContent=SN[est]+' ('+est+')';bg.style.borderColor=c;bg.style.color=c;
    var tag='';if(isAt){var rgb={AL:'56,189,248',BA:'74,222,128',PE:'251,191,36'}[est]||'255,255,255';tag='<div class="ptg" style="background:rgba('+rgb+',0.15);border:1px solid rgba('+rgb+',0.4);color:'+SC[est]+';">🔥 Município Ativo</div>';}
    var mT=TBM[norm(name)]||[];var mTf=mT.filter(matchTest);
    var area_tot=mTf.reduce(function(s,t){return s+(t.area_ha||0);},0);
    var th='';
    if(mTf.length){
      th+='<div class="ps"><div class="pst">📊 Resumo</div><div class="pr"><span class="prl">Testes</span><span class="prv">'+mTf.length+'</span></div>'+(area_tot?'<div class="pr"><span class="prl">Área total</span><span class="prv">'+area_tot+' ha</span></div>':'')+'</div>';
      mTf.forEach(function(t){th+='<div class="tc"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:5px;"><div class="tct" style="margin:0;">🌱 '+t.produtor+'</div>'+statusBadge(t)+'</div>'+avProgress(t)+'<div class="tr"><span class="trl">Fazenda</span><span class="trv">'+t.fazenda+'</span></div><div class="tr"><span class="trl">Híbrido</span><span class="trv trh">'+t.hibrido+'</span></div><div class="pr"><span class="prl">Área</span><span class="trv">'+(t.area_ha||'—')+' ha</span></div><div class="tr"><span class="trl">Plantio</span><span class="trv">'+t.data_plantio+(t.dias_plantio?' ('+t.dias_plantio+'d)':'')+'</span></div>'+(t.distribuidor?'<div class="tr"><span class="trl">Dist.</span><span class="trv">'+t.distribuidor+'</span></div>':'')+(t.av1?'<div class="tr"><span class="trl">AV1 ✅</span><span class="trv" style="color:#22c55e;">'+t.av1+(t.av1_dias?' ('+t.av1_dias+'d)':'')+'</span></div>':'')+(t.av2?'<div class="tr"><span class="trl">AV2 ✅</span><span class="trv" style="color:#22c55e;">'+t.av2+(t.av2_dias?' ('+t.av2_dias+'d)':'')+'</span></div>':'')+(t.lat?'<a class="rb" href="https://www.google.com/maps/dir/?api=1&destination='+t.lat+','+t.lng+'" target="_blank">🗺️ Rota</a>':'')+(t.pasta_onedrive?'<a class="rb gold" href="'+t.pasta_onedrive+'" target="_blank">📁 OneDrive</a>':'')+'</div>';});
    }else th='<div class="notest">Nenhum teste'+(F.cliente||F.hibrido||F.distribuidor||F.lpht||F.ensaio||F.av_groups.size>0?' com filtros ativos':'')+' neste município</div>';
    document.getElementById('p-body').innerHTML=tag+(MUN_HA[name]?'<div class="ps" style="margin-top:9px"><div class="pst">🌽 Área de Milho</div><div class="pr"><span class="prl">Área estimada</span><span class="prv" style="color:var(--gold);font-size:14px;font-weight:800;">'+MUN_HA[name].toLocaleString()+' ha</span></div></div>':'')+
      '<div class="ps"><div class="pst">Localização</div><div class="pr"><span class="prl">Estado</span><span class="prv" style="color:'+c+'">'+SN[est]+'</span></div><div class="pr"><span class="prl">Status</span><span class="prv">'+(isAt?'🔥 Ativo':'📍 Território')+'</span></div></div><div class="ps"><div class="pst">🌱 Testes ForSeed</div>'+th+'</div>';
    document.getElementById('pnl').classList.add('open');map.panBy([147,0],{animate:true,duration:0.3});
  }

  window.opTest=function(t){
    document.getElementById('p-n').textContent=t.fazenda||t.municipio;
    var bg=document.getElementById('p-b');bg.textContent=t.municipio+' — '+t.uf;bg.style.borderColor=TS_C;bg.style.color=TS_C;
    var c2=ST_COLOR[t.status]||'#6b7280';
    document.getElementById('p-body').innerHTML='<div style="margin-top:8px;">'+statusBadge(t)+'</div>'+avProgress(t)+
      '<div class="tc" style="margin-top:8px;"><div class="tct" style="font-size:13px;">'+t.hibrido+(t.biotecnologia?' <span style="font-size:10px;opacity:0.7;">'+t.biotecnologia+'</span>':'')+' — '+(t.area_ha||'—')+' ha</div>'+
      '<div class="tr"><span class="trl">Produtor</span><span class="trv">'+t.produtor+'</span></div>'+(t.distribuidor?'<div class="tr"><span class="trl">Distribuidor</span><span class="trv">'+t.distribuidor+'</span></div>':'')+
      '<div class="tr"><span class="trl">Município</span><span class="trv">'+t.municipio+' / '+t.uf+'</span></div>'+(t.fazenda?'<div class="tr"><span class="trl">Fazenda</span><span class="trv">'+t.fazenda+'</span></div>':'')+'</div>'+
      '<div class="ps" style="margin-top:9px"><div class="pst">🌽 Plantio</div>'+
      '<div class="pr"><span class="prl">Data</span><span class="prv">'+t.data_plantio+(t.dias_plantio?' — <span style="color:var(--ts)">'+t.dias_plantio+' dias</span>':'')+'</span></div>'+
      '<div class="pr"><span class="prl">Híbrido</span><span class="prv" style="color:'+TS_C+';font-weight:700;">'+t.hibrido+'</span></div>'+
      '<div class="pr"><span class="prl">Ensaio</span><span class="prv">'+t.ensaio+'</span></div>'+
      '<div class="pr"><span class="prl">LPHT</span><span class="prv">'+(t.lpht?'✅ SIM':'— NÃO')+'</span></div>'+
      (t.area_ha?'<div class="pr"><span class="prl">Área</span><span class="prv">'+t.area_ha+' ha</span></div>':'')+
      (t.vol_sc?'<div class="pr"><span class="prl">Vol. sacas</span><span class="prv">'+t.vol_sc+' sc</span></div>':'')+
      (t.populacao?'<div class="pr"><span class="prl">Pop. inicial</span><span class="prv">'+t.populacao.toLocaleString()+' pl/ha</span></div>':'')+
      (t.av1?'<div class="pr"><span class="prl">AV1 ✅</span><span class="prv" style="color:#22c55e;">'+t.av1+(t.av1_dias?' ('+t.av1_dias+'d)':'')+'</span></div>':'<div class="pr"><span class="prl">AV1</span><span class="prv" style="color:'+c2+';">'+(ST_LABEL[t.status]||'—')+'</span></div>')+
      (t.av2?'<div class="pr"><span class="prl">AV2 ✅</span><span class="prv" style="color:#22c55e;">'+t.av2+(t.av2_dias?' ('+t.av2_dias+'d)':'')+'</span></div>':'')+
      '</div>'+(t.lat?'<div class="ps"><div class="pst">📍 Localização</div><div class="pr"><span class="prl">Precisão</span><span class="prv">'+(t.has_real_coords?'✅ Coords exatas':'📍 Centro município')+'</span></div>'+(t.has_real_coords?'<div class="pr"><span class="prl">Lat/Lng</span><span class="prv" style="font-size:10px;">'+t.lat+', '+t.lng+'</span></div>':'')+
      (t.has_real_coords?'<a class="rb" href="https://www.google.com/maps/dir/?api=1&destination='+t.lat+','+t.lng+'" target="_blank">🗺️ Rota Google Maps</a>':'')+'</div>':'')+
      '<div class="ps"><div class="pst">📂 Arquivos</div>'+(t.pasta_onedrive?'<a class="rb gold" href="'+t.pasta_onedrive+'" target="_blank">📁 Pasta do cliente — OneDrive</a>':'<div class="notest">Pasta não configurada</div>')+'</div>';
    document.getElementById('pnl').classList.add('open');
    if(t.lat&&t.has_real_coords)map.flyTo([t.lat,t.lng],14,{duration:0.6});
    else if(t.lat)map.flyTo([t.lat,t.lng],11,{duration:0.6});
  };

  window.clsP=function(){document.getElementById('pnl').classList.remove('open');map.panBy([-147,0],{animate:true,duration:0.3});};
  var _tt;window.toast=function(msg){var el=document.getElementById('toast-el');el.textContent=msg;el.classList.add('show');clearTimeout(_tt);_tt=setTimeout(function(){el.classList.remove('show');},1400);};
  document.addEventListener('keydown',function(e){if(e.key==='Escape')clsP();if(e.key==='/'&&e.target.tagName!=='INPUT'){e.preventDefault();document.getElementById('srch').focus();}});
  applyFilters();
  setTimeout(function(){map.invalidateSize();},150);
});
</script></body></html>
